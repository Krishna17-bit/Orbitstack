version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: orbitstack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: orbitstack_secure_db_pass
      POSTGRES_DB: orbitstack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbitstack-backend
    environment:
      - DATABASE_URL=postgresql://postgres:orbitstack_secure_db_pass@db:5432/orbitstack
      - PROJECT_NAME=OrbitStack Reliability Core
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orbitstack-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
